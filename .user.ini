; =========================================================
; InterLink — PHP-FPM configuration (InfinityFree / cPanel)
; =========================================================
; This file is the PHP-FPM equivalent of php_flag/php_value in .htaccess.
; InfinityFree uses PHP-FPM (FastCGI), so .htaccess php_flag directives
; are IGNORED there — this .user.ini file is read instead.
; =========================================================

; Suppress errors so PHP notices/warnings don't corrupt JSON API responses
display_errors = Off
display_startup_errors = Off
error_reporting = 0
log_errors = On

; Session settings
session.gc_maxlifetime = 2592000
session.cookie_lifetime = 2592000
session.cookie_httponly = 1
session.name = InterLink_session
